<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <title>mot croisés</title>
    <link rel="stylesheet" href="style.css"/>
  </head>
  <body>
  <div class="container">
    <h1> Mots croisés:HARDWARE </h1>
    <div class="content">
        <div class="grid" id="crossword">
          <p>PROGRESSION/<strong id="percent">0%</strong></p>
           <div class="progress"><div id="bar"></div></div>
            <p id="status">Composants trouvés : 0 / 10</p>
             <div class="buttons">
              <button id="reveal">Afficher la solution</button>
              <button id="reset" class="ghost">Réinitialiser</button>
            </div>
        </div>

    
    </div> 
    <div style="text-align:center">
   <div id="timer">00:00 </div>
    </div>
  </div>

    
    <script src="script.js"></script>
  </body>
</html>
